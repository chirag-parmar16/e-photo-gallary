<!-- Create User Modal -->
<div id="createUserModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" data-modal="createUserModal">&times;</span>
        <h3 style="margin-bottom: 1.5rem;">Create New User</h3>
        <form id="createUserForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="newEmail" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="newPassword" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="newRole" class="form-control">
                    <option value="user">User</option>
                    <option value="admin">Super Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Create User</button>
        </form>
    </div>
</div>

<!-- Create Book Modal -->
 <div id="createBookModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" data-modal="createBookModal">&times;</span>
        <h3 style="margin-bottom: 1.5rem;">Create New Album</h3>
        <form id="createBookForm">
            <div class="form-group">
                <label>Album Name (Internal)</label>
                <input type="text" id="newBookTitle" class="form-control" required placeholder="e.g. Wedding 2024">
            </div>
            <div class="form-group">
                <label>Theme Template</label>
                <select id="newBookTemplate" class="form-control">
                    <option value="default" data-icon="fas fa-magic">Default</option>
                    <option value="birthday" data-icon="fas fa-cake-candles">Birthday</option>
                    <option value="wedding" data-icon="fas fa-rings-wedding">Wedding</option>
                    <option value="anniversary" data-icon="fas fa-champagne-glasses">Anniversary</option>
                </select>
            </div>
            <div class="form-group">
                <label>Album Border Layout</label>
                <select id="newBookBorder" class="form-control">
                    <option value="none" data-icon="fas fa-border-none">No Border (Clean)</option>
                    <option value="floral" data-icon="fas fa-seedling">Floral Decoration</option>
                    <option value="classic" data-icon="fas fa-image">Classic Frame</option>
                    <option value="modern" data-icon="fas fa-minus">Modern Minimalist</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Create Album</button>
        </form>
    </div>
</div>

<!-- Change Password Modal -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Change Password</h3>
            <button class="close-modal" data-modal="passwordModal">&times;</button>
        </div>
        <form id="passwordForm">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPass" class="form-control" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPass" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPass" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; height: 50px;">Update Password</button>
            <p id="passwordError" style="color: red; margin-top: 15px; display: none; font-weight: 500; text-align: center;"></p>
        </form>
    </div>
</div>
<!-- Delete Confirmation Modal -->
<div id="deleteConfirmModal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center; border-radius: 16px; padding: 1.5rem; position: relative;">
        <span class="close-modal" data-modal="deleteConfirmModal" style="position: absolute; top: 12px; right: 15px; font-size: 1.2rem; cursor: pointer; color: #94a3b8;"><i class="fas fa-times"></i></span>
        <div style="font-size: 2rem; color: #ff4d6d; margin: 0.5rem 0 1rem 0;"><i class="fas fa-trash-alt"></i></div>
        <h3 id="deleteModalTitle" style="margin-bottom: 8px; font-size: 1.1rem;">Confirm Action</h3>
        <p id="deleteModalMessage" style="color: #64748b; margin-bottom: 1.5rem; font-size: 0.85rem;">Are you sure you want to proceed?</p>
        <div style="display: flex; justify-content: center;">
            <button id="confirmDeleteBtn" class="btn-primary" style="width: 100%; background: #ff4d6d; height: 36px; font-size: 0.85rem;">Delete</button>
        </div>
    </div>
</div>

<!-- Edit User Plan Modal -->
<div id="editPlanModal" class="modal">
    <div class="modal-content" style="max-width: 600px; border-radius: 16px; padding: 1.5rem;">
        <span class="close-modal" data-modal="editPlanModal" style="position: absolute; top: 12px; right: 15px; font-size: 1.2rem; cursor: pointer; color: #94a3b8;"><i class="fas fa-times"></i></span>
        <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem;"><i class="fas fa-edit" style="color: var(--adm-accent-color); margin-right: 8px;"></i> Manage User Plan</h3>
        <form id="editPlanForm">
            <input type="hidden" id="editPlanUserId">
            <div class="form-group">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--adm-text-muted);">Subscription Tier</label>
                <select id="editUserPlanSelect" class="form-control" style="height: 40px; font-size: 0.9rem;">
                    <option value="free" data-icon="fas fa-hand-holding-heart">Free Tier</option>
                    <option value="basic" data-icon="fas fa-star" data-color="#0ea5e9">Basic Tier</option>
                    <option value="pro" data-icon="fas fa-crown" data-color="#ff4d6d">Pro Tier</option>
                </select>
            </div>
            <div class="form-group">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--adm-text-muted);">Duration Extension (Days)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="editPlanDays" class="form-control" value="0" min="0" style="height: 40px; font-size: 0.9rem; flex: 1;">
                    <button type="button" class="btn-primary" onclick="setLifetime()" style="width: auto; height: 40px; font-size: 0.8rem; background: var(--adm-accent-color);">Lifetime</button>
                </div>
                <small style="color: #94a3b8; font-size: 0.75rem; margin-top: 4px; display: block;">Add days to current expiry or set Lifetime.</small>
            </div>
            <div style="text-align: center; margin: 10px 0; color: #94a3b8; font-size: 0.8rem; font-weight: 600;">— OR —</div>
            <div class="form-group">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--adm-text-muted);">Specific Expiration Date</label>
                <input type="date" id="editPlanDirectDate" class="form-control" style="height: 40px; font-size: 0.9rem;">
                <small style="color: #94a3b8; font-size: 0.75rem; margin-top: 4px; display: block;">Pick a specific date to override current expiry.</small>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; height: 40px; margin-top: 1rem; font-size: 0.9rem;">Update Subscription</button>
        </form>
    </div>
</div>
