<body>
    <div id="app-container" style="display: none;">
        <div id="sidebar-container"></div>
        <main class="main-wrapper">
            <div id="navbar-container"></div>
            <div id="main-view">
<!-- User Management View -->
<div class="view-container active reveal-up">
    <div class="view-header">
        <div>
            <h2><i class="fa-solid fa-user-gear" style="color:var(--adm-accent-color); margin-right:12px;"></i> Registry Management</h2>
            <p style="color:var(--adm-text-muted);">Manage enterprise access levels and account status.</p>
        </div>
        <button id="openCreateUserModal" class="btn-primary">
            <i class="fa-solid fa-user-plus"></i> Provision New Account
        </button>
    </div>

    <!-- Stats row -->
    <div class="stats-grid" id="userStatsGrid" style="margin-bottom:2.5rem;">
        <!-- Dynamically populated -->
    </div>

    <!-- User Table -->
    <div class="data-table-container">
        <table id="adminUserManagementTable" class="display responsive nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Ref ID</th>
                    <th>Registry Email</th>
                    <th>Access</th>
                    <th>Tier</th>
                    <th>Service Expiry</th>
                    <th>Operations</th>
                </tr>
            </thead>
            <tbody id="adminUserList"></tbody>
        </table>
    </div>
</div>

<!-- Modals are loaded dynamically into #modals-container -->

            </div>
            <footer>
                <p>&copy; 2026 Timeless Memories. Built with ❤️</p>
            </footer>
        </main>
    </div>
    <div id="modals-container"></div>
    <div id="modal-container"></div>
    <script>
        window.currentViewName = 'users';
    </script>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/admin.js?v=8"></script>
