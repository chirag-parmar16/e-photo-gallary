<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
</head>
<body>
    <div id="app-container" style="display: none;">
        <div id="sidebar-container"></div>
        <main class="main-wrapper">
            <div id="navbar-container"></div>
            <div id="main-view">
<!-- User Management View -->
<div class="view-container active reveal-up">
    <div class="view-header">
        <div>
            <h2><i class="fas fa-users-cog" style="color:var(--adm-accent-color); margin-right:12px;"></i> Registry Management</h2>
            <p style="color:var(--adm-text-muted);">Manage enterprise access levels and account status.</p>
        </div>
        <button id="openCreateUserModal" class="btn-primary">
            <i class="fas fa-user-plus"></i> Provision New Account
        </button>
    </div>

    <!-- Stats row -->
    <div class="stats-grid" id="userStatsGrid" style="margin-bottom:2.5rem;">
        <!-- Dynamically populated -->
    </div>

    <!-- User Table -->
    <div class="data-table shadow-sm" style="background: var(--adm-main-bg); border-radius: 16px; border: 1px solid var(--adm-border-color); overflow: hidden;">
        <div class="table-row table-header" style="grid-template-columns: 80px 1.8fr 120px 140px 180px 140px; background: rgba(0,0,0,0.02); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem;">
            <div>Ref ID</div>
            <div>Registry Email</div>
            <div>Access</div>
            <div>Tier</div>
            <div>Service Expiry</div>
            <div>Operations</div>
        </div>
        <div id="adminUserList"></div>
    </div>
</div>

<!-- Modals are loaded dynamically into #modals-container -->

            </div>
            <footer>
                <p>&copy; 2026 Timeless Memories. Built with ❤️</p>
            </footer>
        </main>
    </div>
    <div id="modals-container"></div>
    <div id="modal-container"></div>
    <script>
        window.currentViewName = 'users';
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/admin.js?v=8"></script>
</body>
</html>
