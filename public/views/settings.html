<div id="settings-view" class="view-container">
    <div class="view-header">
        <h2>My Settings</h2>
    </div>

    <div style="background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 2rem;">
        <h3 style="margin-bottom: 1.5rem; color: var(--primary-color);">Profile Setup</h3>
        <p style="color: #666; margin-bottom: 2rem;">Update your personal details here.</p>
        
        <form id="profileForm">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">Display Name</label>
                <input type="text" id="profileName" placeholder="Your Name" style="width: 100%; max-width: 400px; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
            
            <button type="submit" class="btn-primary" style="height: 48px; min-width: 150px;">Save Profile</button>
        </form>
    </div>

    <div style="background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 2rem;">
        <h3 style="margin-bottom: 1.5rem; color: var(--primary-color);">Security</h3>
        <p style="color: #666; margin-bottom: 1.5rem;">Manage your password and security preferences.</p>
        <button id="openSettingsPasswordModal" class="btn-outline">Change Password</button>
    </div>
</div>
