<div id="settings-view" class="view-container">
    <div class="view-header">
        <h2>My Settings</h2>
    </div>

    <div class="stat-card" style="display: block; width: 100%; max-width: 800px; margin-top: 2rem; padding: 2.5rem;">
        <h3 style="margin-bottom: 1rem; color: var(--adm-accent-color);">Profile Setup</h3>
        <p style="color: #64748b; margin-bottom: 2rem;">Update your personal details here.</p>
        
        <form id="profileForm">
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="profileName" class="form-control" placeholder="Your Name" style="max-width: 400px;">
            </div>
            
            <button type="submit" class="btn-primary" style="min-width: 150px;">Save Profile</button>
        </form>
    </div>

    <div class="stat-card" style="display: block; width: 100%; max-width: 800px; margin-top: 2rem; padding: 2.5rem;">
        <h3 style="margin-bottom: 1rem; color: var(--adm-accent-color);">Security</h3>
        <p style="color: #64748b; margin-bottom: 1.5rem;">Manage your password and security preferences.</p>
        <button id="openSettingsPasswordModal" class="btn-outline">Change Password</button>
    </div>
</div>
