<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria - Album Explorer</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'dark') {
                document.body ? document.body.style.background = '#0c111d' : null;
            }
        })();
    </script>
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading Explorer...</div>
    </div>
    <div id="app-container" style="display: none;">
        <div id="sidebar-container"></div>
        <main class="main-wrapper">
            <div id="navbar-container"></div>
            <div id="main-view">
                <div class="view-container active reveal-up">
                    <div class="view-header">
                        <div>
                            <h2><i class="fa-solid fa-earth-americas" style="color:var(--adm-accent-color); margin-right:12px;"></i> Global Album Explorer</h2>
                            <p style="color:var(--adm-text-muted);">Audit every visual story across the platform.</p>
                        </div>
                    </div>

                    <div class="dashboard-grid explorer-grid" id="globalAlbumList">
                        <!-- Albums will be loaded here -->
                        <div class="loading-placeholder">
                            <i class="fas fa-circle-notch fa-spin"></i>
                            <p>Scanning registry...</p>
                        </div>
                    </div>
                </div>
            </div>
            <footer>
                <p>&copy; 2026 Timeless Memories. Built with ❤️</p>
            </footer>
        </main>
    </div>
    <div id="modals-container"></div>
    <div id="modal-container"></div>
    <script>
        window.currentViewName = 'album_explorer';
    </script>
    <script src="/admin.js?v=9"></script>
</body>
</html>
