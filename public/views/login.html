<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Memoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --pink: #ff4d6d;
            --pink-light: #ff758f;
            --dark: #0f172a;
            --text-muted: #94a3b8;
            --white: #ffffff;
        }

        /* ===== GENERAL RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Prevent icon font override */
        .fas, .fab, .far, .fa-solid, .fa-brands, .fa-regular {
            font-family: "Font Awesome 6 Free" !important;
        }

        html, body {
            width: 100%;
            min-height: 100vh; /* Changed to 100vh to fix vertical background breaking */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #16213e 100%);
            background-attachment: fixed; /* Prevents gradient from breaking on scroll */
            color: var(--white);
            overflow-x: hidden;
        }

        /* ===== BACKGROUND PARALLAX ===== */
        .parallax-bg {
            position: fixed; /* Changed from absolute to fixed to prevent document stretching */
            inset: 0; 
            z-index: 0; 
            pointer-events: none;
            overflow: hidden; /* Prevent blurred elements from causing scrollbars */
        }
        .p-img {
            position: absolute; 
            border-radius: 12px; 
            opacity: 0.08; 
            filter: blur(6px);
            border: 8px solid white; 
            border-bottom-width: 30px;
        }
        .p-img-1 { width: 180px; top: 15%; left: 10%; transform: rotate(-15deg); }
        .p-img-2 { width: 250px; bottom: 15%; right: 10%; transform: rotate(10deg); filter: blur(8px); opacity: 0.05; }

        /* ===== LOGIN SCREEN LAYOUT ===== */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 1; 
            width: 100%;
        }

        /* ===== BRANDING LOGO ===== */
        .logo-header {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem; 
            font-weight: 700;
            color: var(--pink);
            margin-bottom: 30px;
            display: flex; 
            align-items: center; 
            gap: 12px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px; /* Slightly tightened for better form proportions */
            text-align: center;
            margin: 0 auto;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--white);
            font-weight: 600;
        }
        .login-title span {
            color: var(--pink);
            font-style: italic;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        /* ===== TABS ===== */
        #authTabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        .auth-tab {
            flex: 1;
            background: none;
            border: none;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            padding-bottom: 15px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            position: relative;
            text-align: center;
        }

        .auth-tab.active {
            color: var(--white);
        }
        
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--pink);
            box-shadow: 0 0 10px var(--pink);
        }

        /* ===== FORMS & INPUTS ===== */
        form {
            width: 100%;
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
        }

        .form-group.last {
            margin-bottom: 30px;
        }

        .form-group .form-label {
            display: block;
            font-size: 0.95rem;
            color: var(--white);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--white) !important;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: block; /* Fixes inline-block spacing bugs */
        }

        .form-input:focus {
            outline: none;
            border-color: var(--pink);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.15);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Autocomplete fixes */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: var(--white) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* ===== CTA BUTTON ===== */
        .auth-submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--pink), var(--pink-light));
            color: var(--white);
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255,77,109,0.3);
            display: block;
        }

        .auth-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255,77,109,0.45);
        }

        /* ===== ERROR MESSAGES ===== */
        .auth-error {
            color: #ff758f;
            margin-top: 15px;
            display: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        #registerForm {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            #login-screen {
                padding: 15px;
            }
            .login-container {
                padding: 30px 20px;
                border-radius: 20px;
                box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            }
            .logo-header { 
                font-size: 2rem; 
                margin-bottom: 25px;
            }
            .login-title { 
                font-size: 1.7rem; 
            }
            .login-subtitle {
                font-size: 0.9rem;
                margin-bottom: 25px;
            }
            .form-input {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

<!-- Parallax Background Images -->
<div class="parallax-bg">
    <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=300&q=80" class="p-img p-img-1" alt="Bg memory">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=300&q=80" class="p-img p-img-2" alt="Bg memory">
</div>

<div id="login-screen">
    
    <!-- Header Logo -->
    <div class="logo-header"><i class="fas fa-heart"></i> Memoria</div>
    
    <div class="login-container">
        <!-- Title and Subtitle -->
        <h1 class="login-title">Welcome <span>Back</span></h1>
        <p class="login-subtitle">Access your digital photo albums</p>
        
        <!-- Tabs for Switching Forms -->
        <div id="authTabs">
            <button type="button" id="tabLogin" class="auth-tab active" onclick="switchTab('login')">Sign In</button>
            <button type="button" id="tabRegister" class="auth-tab" onclick="switchTab('register')">Register</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="loginEmail" class="form-input" required placeholder="name@example.com">
            </div>
            <div class="form-group last">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-submit-btn">Sign In</button>
            <p id="loginError" class="auth-error"></p>
        </form>
        
        <!-- Registration Form -->
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="registerEmail" class="form-input" required placeholder="name@example.com">
            </div>
            <div class="form-group last">
                <label class="form-label">Password</label>
                <input type="password" id="registerPassword" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-submit-btn">Create Account</button>
            <p id="registerError" class="auth-error"></p>
        </form>
    </div>
</div>

<script>
    function switchTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const title = document.querySelector('.login-title');

        if (tab === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            title.innerHTML = 'Welcome <span>Back</span>';
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            title.innerHTML = 'Create <span>Account</span>';
        }
    }
</script>
<script src="/admin.js?v=5"></script>
</body>
</html>
