<div id="book-editor" class="view-container">
    <div class="view-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-outline" id="backToDashBtn" style="padding: 5px 15px;"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 id="editorBookTitle">Album Name</h2>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a id="publicLinkBtn" href="#" target="_blank" class="text-link">View Live <i class="fas fa-external-link-alt"></i></a>
            <button class="btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Add Page</button>
        </div>
    </div>
    
    <!-- Book Settings Mini-Panel -->
    <div style="background: white; padding: 1.5rem; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 2rem; border: 1px solid var(--border-color);">
        <h4 style="margin-bottom: 1rem; color: #888; font-size: 0.9rem;">Album Settings</h4>
        <form id="bookSettingsForm" style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">Album Title</label>
                <input type="text" id="editBookTitle" required>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">Cover Title</label>
                <input type="text" id="editCoverTitle" required>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">Cover Subtitle</label>
                <input type="text" id="editCoverSubtitle" required>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">Tap Instruction</label>
                <input type="text" id="editInstructionText" required>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">End Title</label>
                <input type="text" id="editEndTitle" required>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">Theme Template</label>
                <select id="editTemplateType" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="default">Default</option>
                    <option value="birthday">Birthday 🎂</option>
                    <option value="wedding">Wedding 💍</option>
                    <option value="anniversary">Anniversary 🥂</option>
                </select>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">Primary Color</label>
                <input type="color" id="editColorSchema" style="width: 100%; height: 44px; border: none; cursor: pointer; background: none;">
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label style="display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa;">Global Border Style</label>
                <select id="editBorderStyle" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="none">None</option>
                    <option value="solid-primary">Solid (Primary Color)</option>
                    <option value="dashed-primary">Dashed (Primary Color)</option>
                    <option value="double-primary">Double (Primary Color)</option>
                    <option value="floral">Floral Pattern 🌸</option>
                </select>
            </div>
            <button type="submit" class="btn-outline" style="height: 48px; min-width: 150px;">Update Settings</button>
        </form>
    </div>

    <div class="data-table">
        <div class="table-row table-header page-row">
            <div>Order</div>
            <div>Content</div>
            <div>Media</div>
            <div>Actions</div>
        </div>
        <div id="pageList"></div>
    </div>
</div>

<!-- Page Editor Modal (Moved from index.html during refactor) -->
<div class="modal" id="pageModal">
    <div class="modal-content" style="max-width: 800px;">
        <h3 style="margin-bottom: 20px;">Edit Page</h3>
        <form id="pageForm">
            <input type="hidden" id="editPageId">
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Content / Text</label>
                <div id="editor-container" style="height: 200px; background: white; border-radius: 0 0 10px 10px;"></div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Media Upload (Max 4)</label>
                <div style="padding: 15px; border: 2px dashed #ddd; border-radius: 10px; text-align: center; background: #fdfdfd;">
                    <input type="file" id="mediaFile" multiple accept="image/*,video/*" style="display: none;">
                    <button type="button" class="btn-outline" onclick="document.getElementById('mediaFile').click()">
                        <i class="fas fa-cloud-upload-alt"></i> Select Files
                    </button>
                    <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">Supported: JPG, PNG, GIF, MP4, WebM (Auto-compressed)</p>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Page Border Style</label>
                <select id="editPageBorderStyle" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <option value="none">None</option>
                    <option value="solid-page">Solid Primary Color</option>
                    <option value="dashed-page">Dashed Accent Color</option>
                    <option value="double-page">Double Gray Frame</option>
                    <option value="groove-page">Gold Groove Frame</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">Media Layout Preview</label>
                <div id="previewGrid" style="display: flex; gap: 10px; flex-wrap: wrap; padding: 10px; background: #f5f5f5; border-radius: 10px; min-height: 100px;">
                    <!-- Previews generated dynamically by browser subagent -->
                </div>
            </div>

            <div style="text-align: right; gap: 10px; display: flex; justify-content: flex-end;">
                <button type="button" class="btn-secondary" onclick="document.getElementById('pageModal').classList.remove('active')">Cancel</button>
                <button type="submit" class="btn-primary" id="submitBtn">Save Page</button>
            </div>
        </form>
    </div>
</div>
