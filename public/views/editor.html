<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <!-- DataTables CDN -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

    <script>
        // Immediate Theme Application to prevent white flash
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'dark') {
                document.body ? document.body.style.background = '#0c111d' : null;
            }
        })();
    </script>
</head>
<body>
    <!-- Global Loader -->
    <div id="global-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading Memoria...</div>
    </div>

    <div id="app-container" style="display: none;">
        <div id="sidebar-container"></div>
        <main class="main-wrapper">
            <div id="navbar-container"></div>
            <div id="main-view">
<div id="book-editor" class="view-container active">
    <div class="view-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-outline" id="backToDashBtn" style="padding: 5px 15px;"><i class="fas fa-arrow-left"></i> Back</button>
            <h2 id="editorBookTitle">Album Name</h2>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a id="publicLinkBtn" href="#" target="_blank" class="text-link">View Live <i class="fas fa-external-link-alt"></i></a>
            <button class="btn-primary" id="openAddModal"><i class="fas fa-plus"></i> Add Page</button>
        </div>
    </div>
    
    <!-- Book Settings Mini-Panel -->
    <div class="stat-card glass-morph-card" style="padding: 2rem; display: block; margin-bottom: 2rem;">
        <h4 style="margin-bottom: 1.5rem; color: var(--adm-text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em;">Album Settings</h4>
        <form id="bookSettingsForm" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; align-items: end;">
            <div class="form-group" style="margin-bottom: 0;">
                <label>Album Name</label>
                <input type="text" id="editBookTitle" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Cover Title</label>
                <input type="text" id="editCoverTitle" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Cover Subtitle</label>
                <input type="text" id="editCoverSubtitle" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Tap Instruction</label>
                <input type="text" id="editInstructionText" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>End Title</label>
                <input type="text" id="editEndTitle" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Theme Template</label>
                <select id="editTemplateType" class="form-control">
                    <option value="default">Default</option>
                    <option value="birthday">Birthday</option>
                    <option value="wedding">Wedding</option>
                    <option value="anniversary">Anniversary</option>
                    <option value="graduation">Graduation</option>
                    <option value="travel">Travel</option>
                    <option value="babyshower">Baby Shower</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Primary Color</label>
                <input type="color" id="editColorSchema" class="form-control" style="height: 44px; padding: 5px;">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>Global Border</label>
                <select id="editBorderStyle" class="form-control">
                    <option value="none">No Border (Clean)</option>
                    <option value="floral">Floral Decoration</option>
                    <option value="classic">Classic Frame</option>
                    <option value="modern">Modern Minimalist</option>
                    <option value="vintage">Vintage Corner</option>
                    <option value="royal">Royal Emblem</option>
                    <option value="lace">Lace Trim</option>
                    <option value="geometric">Geometric Corner</option>
                    <option value="handmade">Hand-drawn Line</option>
                    <option value="artdeco">Art Deco Gold</option>
                    <option value="dotted">Classic Dotted</option>
                    <option value="double">Elegant Double</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" style="height: 48px;">Update Album</button>
        </form>
    </div>

    <div class="data-table-container">
        <table id="pageEditorTable" class="display responsive nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Order</th>
                    <th>Content</th>
                    <th>Media</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="pageList"></tbody>
        </table>
    </div>
</div>

<!-- Page Editor Modal (Moved from index.html during refactor) -->
<div class="modal" id="pageModal">
    <div class="modal-content" style="max-width: 800px;">
        <h3 id="pageModalTitle" style="margin-bottom: 20px;">Edit Page</h3>
        <form id="pageForm">
            <input type="hidden" id="editPageId">
            
            <div class="form-group">
                <label>Content / Text</label>
                <div id="editor-container"></div>
            </div>

            <div class="form-group">
                <label>Media Upload (Max 4)</label>
                <div class="custom-file-upload">
                    <input type="file" id="mediaFile" multiple accept="image/*,video/*" style="display: none;">
                    <button type="button" class="btn-outline" onclick="document.getElementById('mediaFile').click()">
                        <i class="fas fa-cloud-upload-alt"></i> Select Files
                    </button>
                    <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">Supported: JPG, PNG, GIF, MP4 (Max 5MB each)</p>
                </div>
            </div>

            <!-- Global border is used now -->
            <input type="hidden" id="editPageBorderStyle" value="none">

            <div class="form-group">
                <label>Media Layout Preview</label>
                <div id="previewGrid">
                    <!-- Previews generated dynamically -->
                </div>
            </div>

            <div style="text-align: right; gap: 10px; display: flex; justify-content: flex-end;">
                <button type="button" class="btn-secondary" onclick="document.getElementById('pageModal').classList.remove('active')">Cancel</button>
                <button type="submit" class="btn-primary" id="submitBtn">Save Page</button>
            </div>
        </form>
    </div>
</div>

            </div>
            <footer>
                <p>&copy; 2026 Timeless Memories. Built with ❤️</p>
            </footer>
        </main>
    </div>
    <div id="modals-container"></div>
    <div id="modal-container"></div>
    <script>
        window.currentViewName = 'editor';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/admin.js?v=8"></script>
</body>
</html>
