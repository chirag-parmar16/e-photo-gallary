<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Timeless Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css?v=4">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- iziToast -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf2f2; z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(192,0,0,0.08); width: 100%; max-width: 480px; text-align: center;">
            <h1 style="font-family: 'Playfair Display', serif; color: var(--accent-color); margin-bottom: 20px; font-size: 2.5rem;">Memoria - A Digital Photo Album</h1>
            <p style="color: #666; margin-bottom: 25px; font-size: 1.1rem;">Welcome to your dashboard</p>
            <div id="authTabs" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 25px;">
                <button type="button" id="tabLogin" style="background: none; border: none; font-size: 1.2rem; font-weight: 600; cursor: pointer; color: var(--accent-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 5px;">Sign In</button>
                <button type="button" id="tabRegister" style="background: none; border: none; font-size: 1.2rem; font-weight: 600; cursor: pointer; color: #999; padding-bottom: 5px;">Register</button>
            </div>
            <form id="loginForm">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="name@example.com" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div style="margin-bottom: 30px; text-align: left;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; height: 52px; font-size: 1.1rem;">Sign In</button>
                <p id="loginError" style="color: red; margin-top: 15px; display: none; font-weight: 500;"></p>
            </form>
            <form id="registerForm" style="display: none;">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">Email Address</label>
                    <input type="email" id="registerEmail" required placeholder="name@example.com" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div style="margin-bottom: 30px; text-align: left;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">Password</label>
                    <input type="password" id="registerPassword" required placeholder="••••••••" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; height: 52px; font-size: 1.1rem;">Create Account</button>
                <p id="registerError" style="color: red; margin-top: 15px; display: none; font-weight: 500;"></p>
            </form>
        </div>
    </div>

    <!-- Main App (Hidden by default) -->
    <div id="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-heart"></i> Memoria
            </div>
            <nav>
                <ul class="nav-links" id="sidebar-nav">
                    <!-- Links injected via JS based on Role -->
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <nav class="navbar">
                <button id="mobileMenuToggle" class="mobile-toggle"><i class="fas fa-bars"></i></button>
                <div class="user-profile">
                    <span id="navUsername">User</span>
                    <button id="openPasswordModal" style="margin-left: 15px; padding: 5px 10px; border: 1px solid var(--accent-color); color: var(--accent-color); border-radius: 6px; background: white; cursor: pointer; font-size: 0.85rem;"><i class="fas fa-key"></i> Pass</button>
                    <button id="logoutBtn" style="margin-left: 10px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 0.85rem;">Logout</button>
                </div>
            </nav>

            <!-- Dynamic View Routing Target -->
            <div id="main-view"></div>

            <footer>
                <p>&copy; 2026 Timeless Memories. Built with ❤️</p>
            </footer>
        </main>
    </div>

    <!-- MODALS for Admin/User actions -->
    <!-- Create User Modal -->
    <div id="createUserModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" data-modal="createUserModal">&times;</span>
            <h3 style="margin-bottom: 1.5rem;">Create New User</h3>
            <form id="createUserForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="newEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="newPassword" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="newRole" class="form-control">
                        <option value="user">User</option>
                        <option value="admin">Super Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Create User</button>
            </form>
        </div>
    </div>

    <!-- Create Book Modal -->
     <div id="createBookModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" data-modal="createBookModal">&times;</span>
            <h3 style="margin-bottom: 1.5rem;">Create New Album</h3>
            <form id="createBookForm">
                <div class="form-group">
                    <label>Album Name (Internal)</label>
                    <input type="text" id="newBookTitle" class="form-control" required placeholder="e.g. Wedding 2024">
                </div>
                <div class="form-group">
                    <label>Theme Template</label>
                    <select id="newBookTemplate" class="form-control">
                        <option value="default">Default</option>
                        <option value="birthday">Birthday 🎂</option>
                        <option value="wedding">Wedding 💍</option>
                        <option value="anniversary">Anniversary 🥂</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Album Border Layout</label>
                    <select id="newBookBorder" class="form-control">
                        <option value="none">No Border (Clean)</option>
                        <option value="floral">Floral Decoration 🌸</option>
                        <option value="classic">Classic Frame 🖼️</option>
                        <option value="modern">Modern Minimalist</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Create Album</button>
            </form>
        </div>
    </div>


    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Change Password</h3>
                <button class="close-modal" data-modal="passwordModal">&times;</button>
            </div>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPass" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPass" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPass" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; height: 50px;">Update Password</button>
                <p id="passwordError" style="color: red; margin-top: 15px; display: none; font-weight: 500; text-align: center;"></p>
            </form>
        </div>
    </div>

    <script src="/admin.js?v=4"></script>
</body>
</html>
