<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Timeless Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css?v=4">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

</head>
<body>
    <!-- Login Screen (Injected via JS) -->
    <div id="login-screen" style="display: none;"></div>

    <!-- Main App (Hidden by default) -->
    <div id="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-heart"></i> Memoria
            </div>
            <nav>
                <ul class="nav-links" id="sidebar-nav">
                    <!-- Links injected via JS based on Role -->
                </ul>
            </nav>
            <div class="sidebar-bottom">
                <div class="sidebar-user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="sidebarUsername">User</span>
                </div>
                <button id="logoutBtn" class="sidebar-logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <nav class="navbar">
                <button id="mobileMenuToggle" class="mobile-toggle"><i class="fas fa-bars"></i></button>
                <div class="user-profile">
                    <span id="navUsername">User</span>
                </div>
            </nav>

            <!-- Dynamic View Routing Target -->
            <div id="main-view"></div>

            <footer>
                <p>&copy; 2026 Timeless Memories. Built with ❤️</p>
            </footer>
        </main>
    </div>


    <!-- Modals (Dynamically Loaded or Injected) -->
    <div id="modal-container"></div>


    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Change Password</h3>
                <button class="close-modal" data-modal="passwordModal">&times;</button>
            </div>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPass" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPass" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPass" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; height: 50px;">Update Password</button>
                <p id="passwordError" style="color: red; margin-top: 15px; display: none; font-weight: 500; text-align: center;"></p>
            </form>
        </div>
    </div>

    <!-- Core Scripts (Ordered for dependencies) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/admin.js?v=8"></script>
</body>
</html>
